name: append-stegdb-receipts

on:
  workflow_call:
    inputs:
      receipt_file:
        description: "Path to JSON receipt file to append"
        required: true
        type: string
    secrets:
      GH_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  append:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure StegDB meta directory exists
        run: |
          mkdir -p meta

      - name: Append receipt to canonical ledger
        shell: bash
        run: |
          set -euo pipefail

          RECEIPT="${{ inputs.receipt_file }}"
          TARGET="meta/stegdb_receipts.jsonl"

          if [[ ! -f "$RECEIPT" ]]; then
            echo "Receipt file not found: $RECEIPT"
            exit 1
          fi

          touch "$TARGET"
          cat "$RECEIPT" >> "$TARGET"

      - name: Commit receipt update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add meta/stegdb_receipts.jsonl

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(stegdb): append canonical receipt [skip ci]"
          git push
