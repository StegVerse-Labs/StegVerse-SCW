name: SCW - Workflow Runnability Audit (API-aware)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SCW
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Run audit
        run: |
          set -euo pipefail
          python tools/workflow_runnability_audit.py --repo-root .

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scw_workflow_runnability_audit
          path: reports/guardians/workflow_runnability_latest.*
          if-no-files-found: warn

      - name: Create receipt JSON (always)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p meta
          cat > meta/workflow_runnability_receipt.json <<EOF
          {
            "type": "workflow_runnability_audit",
            "source_repo": "${{ github.repository }}",
            "source_ref": "${{ github.ref }}",
            "source_sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "artifact_name": "scw_workflow_runnability_audit",
            "report_glob": "reports/guardians/workflow_runnability_latest.*",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Append canonical receipts to StegDB (always)
        if: always()
        uses: ./.github/actions/append-stegdb-receipts
        with:
          stegdb_repo: "stegverse-labs/StegDB"
          receipt_file: "meta/workflow_runnability_receipt.json"
          note: "API-aware workflow runnability audit receipt from SCW."
          target_jsonl: "meta/receipts.jsonl"
          token: ${{ secrets.GH_STEGVERSE_AI_TOKEN }}
